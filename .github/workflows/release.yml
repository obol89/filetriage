name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python build.py
      - run: chmod +x dist/filetriage
      - run: tar czf dist/filetriage-linux.tar.gz -C dist filetriage
      - uses: actions/upload-artifact@v4
        with:
          name: filetriage-linux
          path: dist/filetriage-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: filetriage-windows
          path: dist/filetriage.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python build.py
      - run: chmod +x dist/filetriage
      - run: tar czf dist/filetriage-macos.tar.gz -C dist filetriage
      - uses: actions/upload-artifact@v4
        with:
          name: filetriage-macos
          path: dist/filetriage-macos.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: filetriage-linux
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: filetriage-windows
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: filetriage-macos
          path: artifacts/macos
      - run: |
          VERSION="${{ github.ref_name }}"
          tar xzf artifacts/linux/filetriage-linux.tar.gz -C artifacts/linux
          mv artifacts/linux/filetriage "artifacts/filetriage-linux-${VERSION}"
          mv artifacts/windows/filetriage.exe "artifacts/filetriage-windows-${VERSION}.exe"
          tar xzf artifacts/macos/filetriage-macos.tar.gz -C artifacts/macos
          mv artifacts/macos/filetriage "artifacts/filetriage-macos-${VERSION}"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/filetriage-linux-${{ github.ref_name }}
            artifacts/filetriage-windows-${{ github.ref_name }}.exe
            artifacts/filetriage-macos-${{ github.ref_name }}
            install.sh
