name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: filetriage-linux
          path: dist/filetriage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: filetriage-windows
          path: dist/filetriage.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: filetriage-macos
          path: dist/filetriage

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: filetriage-linux
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: filetriage-windows
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: filetriage-macos
          path: artifacts/macos
      - run: |
          mv artifacts/linux/filetriage artifacts/filetriage-linux
          mv artifacts/windows/filetriage.exe artifacts/filetriage-windows.exe
          mv artifacts/macos/filetriage artifacts/filetriage-macos
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/filetriage-linux
            artifacts/filetriage-windows.exe
            artifacts/filetriage-macos
